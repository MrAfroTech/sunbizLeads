<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>
<body>
  <form id="form" enctype="multipart/form-data">
    <p><input type="file" name="document" required></p>
    <div id="rows"></div>
    <p><button type="button" id="add">Add signer</button></p>
    <p><button type="submit">Submit</button></p>
  </form>
  <pre id="out"></pre>
  <script>
    const rows = document.getElementById("rows");
    const add = document.getElementById("add");
    const form = document.getElementById("form");
    const out = document.getElementById("out");
    let members = [];

    fetch("/api/signers")
      .then((r) => r.json())
      .then((cfg) => {
        members = cfg.members || [];
        addRow();
      });

    function addRow() {
      const p = document.createElement("p");
      const sel = document.createElement("select");
      sel.name = "signer";
      members.forEach((m) => {
        const o = document.createElement("option");
        o.value = m.id;
        o.textContent = m.name;
        sel.appendChild(o);
      });
      p.appendChild(sel);
      rows.appendChild(p);
    }

    add.addEventListener("click", addRow);

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const fd = new FormData();
      const fileInput = form.querySelector('input[type="file"]');
      fd.append("document", fileInput.files[0]);
      const order = Array.from(rows.querySelectorAll("select")).map((s) => s.value);
      fd.append("signers", JSON.stringify(order));
      out.textContent = "";
      fetch("/api/envelopes", { method: "POST", body: fd })
        .then((r) => r.json().then((j) => ({ ok: r.ok, j })))
        .then(({ ok, j }) => {
          out.textContent = JSON.stringify(j, null, 2);
        })
        .catch((err) => {
          out.textContent = String(err);
        });
    });
  </script>
</body>
</html>
