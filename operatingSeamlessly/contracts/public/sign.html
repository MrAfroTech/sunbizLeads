<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>
<body>
  <p id="msg"></p>
  <p id="meta"></p>
  <p><iframe id="doc" title="document" width="100%" height="400"></iframe></p>
  <p><canvas id="c" width="400" height="120"></canvas></p>
  <p><button type="button" id="clear">Clear</button></p>
  <p><button type="button" id="sign">Sign</button></p>
  <pre id="out"></pre>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get("token");
    const msg = document.getElementById("msg");
    const meta = document.getElementById("meta");
    const iframe = document.getElementById("doc");
    const canvas = document.getElementById("c");
    const out = document.getElementById("out");
    const ctx = canvas.getContext("2d");
    let drawing = false;

    if (!token) {
      msg.textContent = "missing token";
    } else {
      fetch("/api/sign-context?token=" + encodeURIComponent(token))
        .then((r) => r.json().then((j) => ({ ok: r.ok, status: r.status, j })))
        .then(({ ok, status, j }) => {
          if (!ok) {
            msg.textContent = j.error || status;
            return;
          }
          meta.textContent = j.memberName + " — " + j.originalName;
          iframe.src = j.documentUrl;
          setupDraw();
        })
        .catch((e) => {
          msg.textContent = String(e);
        });
    }

    function setupDraw() {
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 2;
      canvas.addEventListener("pointerdown", (e) => {
        drawing = true;
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
      });
      canvas.addEventListener("pointermove", (e) => {
        if (!drawing) return;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
      });
      canvas.addEventListener("pointerup", () => {
        drawing = false;
      });
      canvas.addEventListener("pointerleave", () => {
        drawing = false;
      });
    }

    document.getElementById("clear").addEventListener("click", () => {
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "#000";
    });

    document.getElementById("sign").addEventListener("click", () => {
      const signatureDataUrl = canvas.toDataURL("image/png");
      out.textContent = "";
      fetch("/api/sign", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, signatureDataUrl }),
      })
        .then((r) => r.json().then((j) => ({ ok: r.ok, j })))
        .then(({ ok, j }) => {
          out.textContent = JSON.stringify(j, null, 2);
        })
        .catch((err) => {
          out.textContent = String(err);
        });
    });
  </script>
</body>
</html>
