<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@mauricethefirst — Guest Retention Captions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 32px 24px;
      min-height: 100vh;
    }

    .page-header {
      max-width: 760px;
      margin: 0 auto 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid #30363d;
    }

    .page-header-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #C9A84C;
      margin-bottom: 10px;
    }

    .page-header h1 {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
    }

    .page-header h1 span {
      color: #C9A84C;
    }

    .page-header-sub {
      font-size: 13px;
      color: #8b949e;
      margin-top: 6px;
    }

    .week-label {
      max-width: 760px;
      margin: 0 auto 24px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #C9A84C;
      border-left: 3px solid #C9A84C;
      padding-left: 12px;
    }

    .post {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      margin: 0 auto 20px;
      overflow: hidden;
      max-width: 760px;
    }

    .post-header {
      padding: 20px 24px;
      border-bottom: 1px solid #30363d;
    }

    .post-day {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 10px;
    }

    .image-line-1 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .image-line-2 {
      font-size: 15px;
      color: #8b949e;
      line-height: 1.4;
    }

    .caption-block {
      padding: 20px 24px;
    }

    .caption-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 12px;
    }

    .caption-text {
      font-size: 14px;
      color: #c9d1d9;
      line-height: 1.75;
      white-space: pre-wrap;
      margin-bottom: 12px;
    }

    .hashtags {
      font-size: 13px;
      color: #58a6ff;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .copy-btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: transparent;
      color: #e6edf3;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: #21262d;
    }

    .copy-btn.copied {
      color: #3fb950;
      border-color: #3fb950;
    }
  </style>

</head>

<body>

<div class="page-header">
  <div class="page-header-label">@mauricethefirst · Guest Retention Carousels</div>
  <h1>GUEST RETENTION <span>CAPTIONS</span></h1>
  <div class="page-header-sub">7 carousels · Operator POV · Personal Brand · No Product Pitch</div>
</div>

<div id="root"></div>

<script>
(function () {

  var DATA = [

    {
      week: 'Series 4 — Guest Retention Carousels (1–7)',
      day: 'Carousel 1 — The Five Drivers of Repeat Revenue',
      line1: "Guests don't come back because they had a good time.",
      line2: 'They come back for one of five reasons.',
      caption:
`Recognition. Consistency. Belonging. Convenience. Value.

Most venues only earn one or two of these — the rest is left to chance.

Which one are you actually delivering on?`,
      hashtags: '#GuestRetention #HospitalityOperator #GuestIntelligence #RepeatBusiness #Seamlessly #VenueRevenue #OperatorMindset #MauriceSeamlessly'
    },

    {
      day: 'Carousel 2 — The Waste Problem',
      line1: 'You over-ordered again this week.',
      line2: 'Not carelessness. Guessing.',
      caption:
`Your actual guest behavior isn't informing your orders. The waste shows up a little at a time, every day.

The operators cutting waste aren't buying less — they're buying smarter.

How much of this week's order was a guess?`,
      hashtags: '#RestaurantOps #InventoryManagement #FoodWaste #GuestIntelligence #Seamlessly #OperatorMindset #MauriceSeamlessly'
    },

    {
      day: 'Carousel 3 — The Staff Retention Problem',
      line1: 'Your best server just quit.',
      line2: "It wasn't the money.",
      caption:
`Every shift was a fresh start — no context, no history.

Staff burn out when they walk into every table blind. Retention is a friction problem, not just a pay problem.

What makes a shift hard at your venue?`,
      hashtags: '#StaffRetention #HospitalityLeadership #EmployeeExperience #GuestIntelligence #Seamlessly #MauriceSeamlessly'
    },

    {
      day: 'Carousel 4 — The Promotion Problem',
      line1: 'You ran the promotion. Packed for two weeks.',
      line2: 'Then they were gone.',
      caption:
`A discount gets someone in the door. It doesn't bring them back.

The first visit is marketing. The second visit is hospitality.

What does your venue do differently on visit two?`,
      hashtags: '#GuestRetention #HospitalityMarketing #RepeatBusiness #Seamlessly #OperatorMindset #MauriceSeamlessly'
    },

    {
      day: 'Carousel 5 — The Inventory Story',
      line1: 'The same item gets wasted every week.',
      line2: 'You order it anyway.',
      caption:
`The ordering process has no feedback loop — last week's behavior never informs this week's order.

That's not a purchasing fix. It's a guest intelligence fix.

What's the item you always over-order?`,
      hashtags: '#InventoryManagement #RestaurantOps #FoodWaste #GuestIntelligence #Seamlessly #MauriceSeamlessly'
    },

    {
      day: 'Carousel 6 — The Regular Is the Business',
      line1: 'One regular is worth more than ten first-timers.',
      line2: 'Most operators chase the first-timer anyway.',
      caption:
`Losing a regular never shows up as a complaint. It shows up as an empty table that used to be booked every Friday.

Acquisition gets the credit. Retention does the work.

How many regulars have you quietly lost?`,
      hashtags: '#GuestRetention #RepeatBusiness #GuestIntelligence #Seamlessly #OperatorMindset #MauriceSeamlessly'
    },

    {
      day: 'Carousel 7 — Five Experience Drivers (Wasted Effort)',
      line1: 'You think guests come back for the food.',
      line2: "They don't.",
      caption:
`Welcomed. Attentive without intrusive. Seamless. Small details. Atmosphere.

That's what actually brings them back.

Which one does your venue nail — and which needs work?`,
      hashtags: '#GuestExperience #HospitalityOperator #GuestRetention #Seamlessly #GuestIntelligence #MauriceSeamlessly'
    }

  ];

  var root = document.getElementById('root');
  var lastWeek = '';

  DATA.forEach(function (post) {

    if (post.week && post.week !== lastWeek) {
      var wl = document.createElement('div');
      wl.className = 'week-label';
      wl.style.marginTop = lastWeek ? '64px' : '0';
      wl.textContent = post.week;
      root.appendChild(wl);
      lastWeek = post.week;
    }

    var el = document.createElement('div');
    el.className = 'post';

    var header = document.createElement('div');
    header.className = 'post-header';

    var dayEl = document.createElement('div');
    dayEl.className = 'post-day';
    dayEl.textContent = post.day;
    header.appendChild(dayEl);

    var l1 = document.createElement('div');
    l1.className = 'image-line-1';
    l1.textContent = post.line1;
    header.appendChild(l1);

    if (post.line2) {
      var l2 = document.createElement('div');
      l2.className = 'image-line-2';
      l2.textContent = post.line2;
      header.appendChild(l2);
    }

    el.appendChild(header);

    var cap = document.createElement('div');
    cap.className = 'caption-block';

    var label = document.createElement('div');
    label.className = 'caption-label';
    label.textContent = 'Caption + Hashtags';
    cap.appendChild(label);

    var capText = document.createElement('div');
    capText.className = 'caption-text';
    capText.textContent = post.caption;
    cap.appendChild(capText);

    var hash = document.createElement('div');
    hash.className = 'hashtags';
    hash.textContent = post.hashtags;
    cap.appendChild(hash);

    var full = post.caption + '\n\n' + post.hashtags;

    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy Caption';

    btn.addEventListener('click', function () {
      navigator.clipboard.writeText(full).then(function () {
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');

        setTimeout(function () {
          btn.textContent = 'Copy Caption';
          btn.classList.remove('copied');
        }, 2000);
      });
    });

    cap.appendChild(btn);
    el.appendChild(cap);
    root.appendChild(el);

  });

}());
</script>

</body>
</html>
