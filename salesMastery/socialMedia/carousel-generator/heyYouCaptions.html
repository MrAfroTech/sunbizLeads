<!DOCTYPE html>
<html lang="en">
<head>

  <title>HeyYou — Carousel Caption Tool</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

      font-family: 'Inter', sans-serif;

    }
    .page-header {

    }
    .page-header-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;

      font-size: 26px;
      font-weight: 700;

    }

      text-transform: uppercase;

      overflow: hidden;
      max-width: 760px;
    }
    .post-header {
      padding: 20px 24px;

    }
    .post-day {
      font-size: 11px;
      font-weight: 700;

      margin-bottom: 10px;

      color: #8b949e;
      line-height: 1.4;

    .caption-block { padding: 20px 24px; }
    .caption-label {

      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 12px;
    }
    .caption-text {
      font-size: 14px;
      color: #c9d1d9;
      line-height: 1.75;
      white-space: pre-wrap;
      margin-bottom: 12px;
    }
    .hashtags {
      font-size: 13px;
      color: #58a6ff;
      margin-bottom: 14px;
      line-height: 1.6;
    }
    .copy-btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: transparent;
      color: #e6edf3;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: #21262d; }
    .copy-btn.copied { color: #3fb950; border-color: #3fb950; }
  </style>
</head>
<body>

  <div class="page-header">

      },

      {
        day: 'Wednesday — The Greeting (Staff POV)',

        caption:
`You called them by name before they sat down.

      {

        caption:
`There's a version of your floor where you're never chasing.

      },

        caption:
`The awkward check dance. Every hospitality person knows it.

        caption:
`The best shifts your staff has ever worked had one thing in common.

        hashtags: '#HospitalityOperator #VenueRevenue #RestaurantGrowth #ShiftManagement #GuestIntelligence #HospitalityTech #OperatorMindset #RevenueGrowth'
      },

      {

        caption:
`Your staff isn't the problem.

You've retrained. Adjusted the schedule. Hired more people.

The complaints didn't stop. The gaps didn't close.

The wait before the greeting lands. The lull where a reorder should have happened. The drag at checkout that poisons an otherwise great night.

When did you first realize your problem wasn't the people — it was the system underneath them? 👇`,

      },

      {
        day: 'Evergreen — The Before / After',
        line1: 'Two identical venues. Two completely different nights.',
        line2: 'Before: guest feels like a stranger. After: guest feels like a regular.',
        caption:
`Two venues. Same neighborhood. Same price point. Same foot traffic.

        hashtags: '#VenueOwner #RestaurantMarketing #HospitalityGrowth #GuestRetention #HeyYou #Seamlessly #GuestExperience #HospitalityStrategy #OperatorLife'
      },

      {
        day: 'Evergreen — The Cost of Doing Nothing',
        line1: "The guests who left quietly last night — you don't know their names.",
        line2: "You didn't lose them to a competitor. You lost them to a moment nobody managed.",
        caption:
`The guests who left quietly last night — you don't know their names.

What's the moment at your venue that you know is losing guests before you even realize they're gone? 👇`,
        hashtags: '#RevenueLeakage #HospitalityRevenue #GuestExperience #VenueOperator #OperatorMindset #GuestIntelligence #HospitalityTech #FixableProblems'
      }

    ];

    var root = document.getElementById('root');
    var lastWeek = '';

    DATA.forEach(function (post) {

      if (post.week && post.week !== lastWeek) {
        var wl = document.createElement('div');
        wl.className = 'week-label';
        wl.style.marginTop = lastWeek ? '64px' : '0';
        wl.textContent = post.week;
        root.appendChild(wl);
        lastWeek = post.week;
      }

      var el = document.createElement('div');
      el.className = 'post';

      var header = document.createElement('div');
      header.className = 'post-header';

      var dayEl = document.createElement('div');
      dayEl.className = 'post-day';
      dayEl.textContent = post.day;
      header.appendChild(dayEl);

      var l1 = document.createElement('div');
      l1.className = 'image-line-1';
      l1.textContent = post.line1;
      header.appendChild(l1);

      if (post.line2) {
        var l2 = document.createElement('div');
        l2.className = 'image-line-2';
        l2.textContent = post.line2;
        header.appendChild(l2);
      }

      el.appendChild(header);

      var cap = document.createElement('div');
      cap.className = 'caption-block';

      var label = document.createElement('div');
      label.className = 'caption-label';
      label.textContent = 'Caption + Hashtags';
      cap.appendChild(label);

      var capText = document.createElement('div');
      capText.className = 'caption-text';
      capText.textContent = post.caption;
      cap.appendChild(capText);

      var hash = document.createElement('div');
      hash.className = 'hashtags';
      hash.textContent = post.hashtags;
      cap.appendChild(hash);

      var full = post.caption + '\n\n' + post.hashtags;

      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy Caption';

      btn.addEventListener('click', function () {
        navigator.clipboard.writeText(full).then(function () {
          btn.textContent = '✓ Copied';
          btn.classList.add('copied');
          setTimeout(function () {
            btn.textContent = 'Copy Caption';
            btn.classList.remove('copied');
          }, 2000);
        });
      });

      cap.appendChild(btn);
      el.appendChild(cap);
      root.appendChild(el);

    });

  }());
  </script>

</body>
</html>
