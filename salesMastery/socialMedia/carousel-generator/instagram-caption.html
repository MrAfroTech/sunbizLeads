<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reels Caption Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 32px 24px;
      min-height: 100vh;
    }

    .week-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f28c38;
      border-left: 3px solid #f28c38;
      padding-left: 12px;
      margin-bottom: 24px;
    }

    .post {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      max-width: 760px;
    }

    .post-header {
      padding: 20px 24px;
      border-bottom: 1px solid #30363d;
    }

    .post-day {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 10px;
    }

    .image-line-1 {
      font-size: 18px;
      font-weight: 700;
      color: #e6edf3;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .image-line-2 {
      font-size: 15px;
      font-weight: 400;
      color: #8b949e;
      line-height: 1.4;
    }

    .caption-block {
      padding: 20px 24px;
    }

    .caption-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 12px;
    }

      line-height: 1.75;
      white-space: pre-wrap;
      margin-bottom: 12px;
    }

    .hashtags {

      color: #58a6ff;
      margin-bottom: 14px;
      line-height: 1.6;

      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: transparent;
      color: #e6edf3;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover { background: #21262d; }
    .copy-btn.copied { color: #3fb950; border-color: #3fb950; }
  </style>
</head>

    var root = document.getElementById('root');
    var lastWeek = '';

    DATA.forEach(function (post) {

      if (post.week && post.week !== lastWeek) {
        var wl = document.createElement('div');
        wl.className = 'week-label';
        wl.style.marginTop = lastWeek ? '64px' : '0';
        wl.textContent = post.week;
        root.appendChild(wl);
        lastWeek = post.week;
      }

      var el = document.createElement('div');
      el.className = 'post';

      var header = document.createElement('div');
      header.className = 'post-header';

      var dayEl = document.createElement('div');
      dayEl.className = 'post-day';
      dayEl.textContent = post.day;
      header.appendChild(dayEl);

      var l1 = document.createElement('div');
      l1.className = 'image-line-1';
      l1.textContent = post.line1;
      header.appendChild(l1);

      if (post.line2) {
        var l2 = document.createElement('div');
        l2.className = 'image-line-2';
        l2.textContent = post.line2;
        header.appendChild(l2);
      }

      el.appendChild(header);

      var cap = document.createElement('div');
      cap.className = 'caption-block';

      var label = document.createElement('div');
      label.className = 'caption-label';
      label.textContent = 'Caption + Hashtags';
      cap.appendChild(label);

      var capText = document.createElement('div');
      capText.className = 'caption-text';
      capText.textContent = post.caption;
      cap.appendChild(capText);

      var hash = document.createElement('div');
      hash.className = 'hashtags';
      hash.textContent = post.hashtags;
      cap.appendChild(hash);

      var full = post.caption + '\n\n' + post.hashtags;

      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy Caption';

      btn.addEventListener('click', function () {
        navigator.clipboard.writeText(full).then(function () {
          btn.textContent = '✓ Copied';
          btn.classList.add('copied');
          setTimeout(function () {
            btn.textContent = 'Copy Caption';
            btn.classList.remove('copied');
          }, 2000);
        });
      });

      cap.appendChild(btn);
      el.appendChild(cap);
      root.appendChild(el);

    });

  }());
