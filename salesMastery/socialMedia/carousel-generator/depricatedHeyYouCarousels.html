<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeyYou Powered by Seamlessly — Carousel Week</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --navy: #1A2A44;
      --gold: #D4AF37;
      --teal: #00D4AA;
      --white: #F5F0E8;
      --dim: rgba(245,240,232,0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #111418;
      padding: 40px 32px 80px;
      color: var(--white);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.35;
    }

    .page-header {
      width: 1080px;
      margin: 0 auto 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(212,175,55,0.2);
    }
    .page-header-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .page-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 0.04em;
      color: var(--white);
      line-height: 1;
    }
    .page-header h1 span { color: var(--gold); }
    .page-header-sub {
      font-size: 13px;
      color: var(--dim);
      margin-top: 8px;
    }

    .day-label {
      width: 1080px;
      margin: 48px auto 12px;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: rgba(212,175,55,0.5);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .day-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(212,175,55,0.15);
    }

    .carousel { width: 1080px; margin: 0 auto 8px; }
    .carousel-window { width: 1080px; overflow: hidden; }
    .carousel-track { display: flex; transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); }

    /* ── SLIDE ── */
    .slide {
      width: 1080px;
      height: 1080px;
      flex-shrink: 0;
      position: relative;
      padding: 80px 108px 108px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .navy-slide { background: var(--navy); color: var(--white); }
    .navy-slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 20%, rgba(212,175,55,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 80%, rgba(0,212,170,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .gold-slide { background: var(--gold); color: var(--navy); }
    .gold-slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 90% 10%, rgba(255,255,255,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .teal-slide { background: var(--teal); color: var(--navy); }

    .dark-slide { background: #0D1520; color: var(--white); }
    .dark-slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(212,175,55,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── PROFILE ── */
    .profile {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 80px;
      position: relative;
      z-index: 2;
    }
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(212,175,55,0.15);
      border: 2px solid rgba(212,175,55,0.4);
      flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-placeholder svg { width: 28px; height: 28px; stroke: rgba(212,175,55,0.4); }

    .profile-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 21px;
      font-weight: 700;
      line-height: 1.2;
    }
    .profile-handle { font-size: 17px; font-weight: 300; opacity: 0.55; margin-top: 2px; }

    .navy-slide .profile-name,
    .dark-slide .profile-name { color: var(--white); }
    .gold-slide .profile-name,
    .teal-slide .profile-name { color: var(--navy); }
    .navy-slide .profile-handle,
    .dark-slide .profile-handle { color: rgba(212,175,55,0.65); }
    .gold-slide .profile-handle,
    .teal-slide .profile-handle { color: rgba(26,42,68,0.55); }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
      gap: 0;
    }

    /* Rule line — appears before titles */
    .slide-rule {
      width: 56px;
      height: 3px;
      margin-bottom: 32px;
      flex-shrink: 0;
    }
    .navy-slide .slide-rule { background: var(--gold); }
    .dark-slide .slide-rule { background: var(--teal); }
    .gold-slide .slide-rule { background: var(--navy); }
    .teal-slide .slide-rule { background: var(--navy); }

    /* Title — Bebas Neue, large */
    .slide-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 78px;
      line-height: 1.0;
      letter-spacing: 0.02em;
      max-width: 840px;
    }
    .navy-slide .slide-title,
    .dark-slide .slide-title { color: var(--white); }
    .gold-slide .slide-title,
    .teal-slide .slide-title { color: var(--navy); }

    .slide-title .accent { color: var(--gold); }
    .gold-slide .slide-title .accent,
    .teal-slide .slide-title .accent { color: rgba(26,42,68,0.55); }

    /* Body — DM Serif italic, for sentence-level slides */
    .slide-body {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 38px;
      line-height: 1.45;
      max-width: 800px;
    }
    .navy-slide .slide-body,
    .dark-slide .slide-body { color: rgba(245,240,232,0.82); }
    .gold-slide .slide-body,
    .teal-slide .slide-body { color: rgba(26,42,68,0.82); }

    /* Sub — smaller body text under a title */
    .slide-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 26px;
      font-weight: 300;
      line-height: 1.55;
      max-width: 780px;
      margin-top: 28px;
    }
    .navy-slide .slide-sub,
    .dark-slide .slide-sub { color: rgba(245,240,232,0.6); }
    .gold-slide .slide-sub,
    .teal-slide .slide-sub { color: rgba(26,42,68,0.65); }

    /* ── GHOST NUMBER ── */
    .ghost {
      position: absolute;
      bottom: 16px;
      right: 56px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 300px;
      line-height: 1;
      letter-spacing: -12px;
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }
    .navy-slide .ghost { color: rgba(212,175,55,0.05); }
    .dark-slide .ghost  { color: rgba(212,175,55,0.04); }
    .gold-slide .ghost  { color: rgba(26,42,68,0.07); }
    .teal-slide .ghost  { color: rgba(26,42,68,0.07); }

    /* ── ACCENT BAR ── */
    .slide-accent-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
    }
    .navy-slide .slide-accent-bar { background: linear-gradient(180deg, var(--gold) 0%, var(--teal) 100%); }
    .dark-slide .slide-accent-bar { background: linear-gradient(180deg, var(--teal) 0%, var(--gold) 100%); }
    .gold-slide .slide-accent-bar { background: var(--navy); }
    .teal-slide .slide-accent-bar { background: var(--navy); }

    /* ── WATERMARK ── */
    .watermark {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 10;
    }
    /* Hey = white/navy, You = gold */
    .watermark .wm-hey { }
    .watermark .wm-you { color: var(--gold); }
    .watermark .wm-rest { }

    .navy-slide .watermark .wm-hey,
    .dark-slide .watermark .wm-hey { color: rgba(245,240,232,0.35); }
    .navy-slide .watermark .wm-rest,
    .dark-slide .watermark .wm-rest { color: rgba(245,240,232,0.25); }
    .navy-slide .watermark .wm-you,
    .dark-slide .watermark .wm-you { color: rgba(212,175,55,0.55); }

    .gold-slide .watermark .wm-hey { color: rgba(26,42,68,0.3); }
    .gold-slide .watermark .wm-rest { color: rgba(26,42,68,0.22); }
    .gold-slide .watermark .wm-you { color: rgba(26,42,68,0.45); }

    .teal-slide .watermark .wm-hey { color: rgba(26,42,68,0.3); }
    .teal-slide .watermark .wm-rest { color: rgba(26,42,68,0.22); }
    .teal-slide .watermark .wm-you { color: rgba(26,42,68,0.45); }

    /* ── NAV ── */
    .nav {
      width: 1080px;
      margin: 12px auto 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-btn {
      padding: 10px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid rgba(212,175,55,0.4);
      background: transparent;
      color: var(--gold);
      border-radius: 3px;
      transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) { background: var(--gold); color: var(--navy); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    .dots { display: flex; gap: 8px; align-items: center; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(212,175,55,0.2);
      transition: all 0.3s;
    }
    .dot.active { background: var(--gold); width: 20px; border-radius: 4px; }

    .download-btn {
      display: block;
      width: 1080px;
      margin: 10px auto 0;
      padding: 14px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: opacity 0.2s;
    }
    .download-btn:disabled { opacity: 0.4; cursor: default; }
    .download-current { background: var(--gold); color: var(--navy); border: none; }
    .download-current:hover:not(:disabled) { opacity: 0.85; }
    .download-all {
      background: transparent;
      border: 1px solid rgba(212,175,55,0.3);
      color: var(--gold);
      margin-top: 6px;
    }
    .download-all:hover:not(:disabled) { background: rgba(212,175,55,0.08); }
  </style>
</head>

<body>

<div class="page-header">
  <div class="page-header-label">HeyYou Powered by Seamlessly · Guest Intelligence Series</div>
  <h1>THE <span>HEYYOU</span> CAROUSEL SYSTEM</h1>
  <div class="page-header-sub">14 carousels · Guest POV · Staff POV · The Math · Chaos Mastery Color System</div>
</div>

<div id="root"></div>

<script>
(function () {

  const PHOTO_SRC = encodeURI('personalBrandPhotos/profilePic.png');
  const THEMES = ['navy-slide', 'gold-slide', 'teal-slide', 'dark-slide', 'navy-slide', 'gold-slide', 'dark-slide'];

  // Each slide: { title, body, sub }
  // title = Bebas Neue big headline
  // body  = DM Serif italic — standalone sentence slides
  // sub   = smaller DM Sans — sits below a title
  // No eyebrows anywhere.

  const DATA = [
    {
      day: 'Monday — The Hook',
      slides: [
        { title: '9 MINUTES COST THAT VENUE 50% OF MY TAB.' },
        { body: 'Nobody was rude. Nobody made a mistake.' },
        { body: 'There was just a window where nobody made me feel worth staying for.' },
        { body: 'That window exists in your venue every single night.' },
        { title: 'THAT 9 MINUTE WINDOW HAS A <span class="accent">DOLLAR AMOUNT.</span>', sub: 'Most operators never calculate it.' }
      ]
    },
    {
      day: 'Tuesday — Before They Walk In (Guest POV)',
      slides: [
        { title: 'YOUR BEST CUSTOMER IS 2 MINUTES AWAY.<br><span class="accent">DOES YOUR STAFF KNOW?</span>' },
        { body: "They've been here four times. They always order the same thing. They tip well. They bring people." },
        { body: "Right now they're walking in cold. Same as a stranger." },
        { body: 'HeyYou sends your staff a notification before they reach the door. Name. Last order. Preference.' },
        { title: 'THE GREETING CHANGES.<br>THE EXPERIENCE CHANGES.<br><span class="accent">THE TAB CHANGES.</span>' }
      ]
    },
    {
      day: 'Wednesday — The Greeting (Guest POV)',
      slides: [
        { title: 'THEY WALKED IN.<br>YOUR STAFF ALREADY KNEW THEIR NAME<br><span class="accent">AND THEIR LAST ORDER.</span>' },
        { body: "Not because your staff has a great memory. Because your system does." },
        { body: "That guest felt seen before they sat down." },
        { body: "Feeling seen is the difference between a one time visitor and a regular." },
        { title: 'TURNS THAT MOMENT FROM<br><span class="accent">LUCK</span> INTO A SYSTEM.' }
      ]
    },
    {
      day: 'Thursday — The Round (Guest POV)',
      slides: [
        { title: 'TIME FOR ANOTHER ROUND.<br>ONE TAP.<br><span class="accent">NO AKWARD LOOKS. NO WAIT.</span>' },
        { body: "The average guest abandons a reorder after 4 minutes of being ignored." },
        { body: "They don't complain. They just stop ordering. And they don't come back." },
        { body: 'HeyYou puts a reorder button in their hand the moment their glass gets low.' },
        { title: 'ONE EXTRA ROUND PER TABLE.<br>EVERY NIGHT.<br><span class="accent">DO THAT MATH.</span>' }
      ]
    },
    {
      day: 'Friday — The Exit (Guest POV)',
      slides: [
        { title: 'THEY PAID. TIPPED. LEFT HAPPY.<br><span class="accent">NOBODY CHASED THEM DOWN FOR A CHECK.</span>' },
        { body: "The check moment is where hospitality either ends well or falls apart." },
        { body: "Waiting for a check after a great meal is the last impression your venue leaves." },
        { body: 'HeyYou closes the tab from their phone. No wait. No awkward wave. No ruined exit.' },
        { title: 'THE LAST 60 SECONDS DETERMINE WHETHER<br><span class="accent">THEY COME BACK.</span><br>MAKE THEM COUNT.' }
      ]
    },
    {
      day: 'Saturday — The Math (Guest POV)',
      slides: [
        { title: 'ONE VISIT.<br>ZERO FRICTION.<br><span class="accent">EVERY MOMENT ACCOUNTED FOR.</span>' },
        { body: "Before they arrived — staff was ready. The greeting landed. They felt known." },
        { body: "During the visit — reorders happened without a wait. Revenue didn't walk out the door." },
        { body: "At checkout — clean exit. Good tip. Great last impression." },
        { title: 'THE GUEST INTELLIGENCE LAYER THAT TURNS<br><span class="accent">FIRST TIME VISITORS</span><br>INTO REGULARS.' }
      ]
    },
    {
      day: 'Tuesday — Before They Walk In (Staff POV)',
      slides: [
        { title: 'YOU KNEW THEY WERE COMING<br><span class="accent">BEFORE THEY WALKED IN THE DOOR.</span>' },
        { body: "Name on your screen. Last order. How they like it. Who they usually bring." },
        { body: "You're not guessing. You're not scrambling. You're ready." },
        { body: "That's not luck. That's HeyYou." },
        { title: 'YOUR STAFF STOPS <span class="accent">REACTING</span><br>AND STARTS <span class="accent">ANTICIPATING.</span>' }
      ]
    },
    {
      day: 'Wednesday — The Greeting (Staff POV)',
      slides: [
        { title: 'YOU CALLED THEM BY NAME<br><span class="accent">BEFORE THEY SAT DOWN.</span>' },
        { body: "Not because you remembered. Because your system did." },
        { body: "That guest's face changed. They felt it." },
        { body: "That moment took 3 seconds. It will keep them coming back for years." },
        { title: 'GIVES YOUR STAFF THE MEMORY OF A VETERAN<br><span class="accent">ON DAY ONE.</span>' }
      ]
    },
    {
      day: 'Thursday — The Round (Staff POV)',
      slides: [
        { title: 'YOU DIDN\'T HAVE TO WATCH EVERY TABLE<br><span class="accent">WAITING FOR A SIGNAL.</span>' },
        { body: "HeyYou told you table 7 was ready before they had to ask." },
        { body: "You arrived with the round. They hadn't even finished asking." },
        { body: "That's not attentive service. That's an intelligent system making you look like the best in the room." },
        { title: 'YOUR STAFF STOPS <span class="accent">CHASING</span> TABLES<br>AND STARTS <span class="accent">OWNING</span> THEM.' }
      ]
    },
    {
      day: 'Friday — The Exit (Staff POV)',
      slides: [
        { title: 'YOU DIDN\'T HAVE TO DO<br><span class="accent">THE AWKWARD CHECK DANCE.</span>' },
        { body: "No hovering. No interrupting a conversation. No missed signal." },
        { body: "They paid from their phone. Left a great tip. Said goodbye on their way out." },
        { body: "Your last interaction was a warm send off. Not a transaction." },
        { title: 'HEYYOU MAKES SURE THE EXIT<br>IS <span class="accent">THE RIGHT ONE.</span>' }
      ]
    },
    {
      day: 'Saturday — The Math (Staff POV)',
      slides: [
        { title: 'YOU HAD YOUR BEST SHIFT<br>IN MONTHS.<br><span class="accent">EVERYTHING WAS PERFECT.</span>' },
        { body: "You weren't reacting all night. You were always one step ahead." },
        { body: "Tables turned faster. Tips were higher. Guests left happy." },
        { body: "Your staff didn't work harder. They worked smarter." },
        { title: 'BUILT FOR THE GUEST.<br><span class="accent">DESIGNED FOR THE STAFF.</span>' }
      ]
    },
    {
      day: 'Monday (Week 2) — The System Hook',
      slides: [
        { title: 'YOUR STAFF ISN\'T RUDE.<br>YOUR SYSTEM IS.<br><span class="accent">AND IT\'S COSTING YOU.</span>' },
        { body: "The wait isn't a staffing problem. It never was." },
        { body: "You hired more people. The complaints didn't stop." },
        { body: "Because the problem isn't the people. It's the moments nobody is managing." },
        { title: 'HEYYOU MANAGES THE MOMENTS<br><span class="accent">YOUR STAFF CAN\'T SEE.</span>' }
      ]
    },
    {
      day: 'Evergreen — The Before / After',
      slides: [
        { title: 'TWO IDENTICAL VENUES.<br><span class="accent">TWO COMPLETELY DIFFERENT NIGHTS.</span>' },
        { body: "Before: Guest walks in. Staff scrambles. No context. Cold greeting. They feel like a stranger." },
        { body: "After: Guest walks in. Staff is ready. Name. Order. Preference. They feel like a regular." },
        { body: "Before: Guest wants another round. Waits 4 minutes. Gives up. Tab closes early." },
        { title: 'AFTER: GUEST TAPS ONCE.<br>ROUND ARRIVES.<br><span class="accent">TAB STAYS OPEN.</span>' }
      ]
    },
    {
      day: 'Evergreen — The Cost of Doing Nothing',
      slides: [
        { title: 'EVERY NIGHT YOU RUN WITHOUT HEYYOU<br><span class="accent">HAS A PRICE.</span>' },
        { body: "The guest who waited too long and didn't reorder — gone." },
        { body: "The regular who felt like a stranger — gone." },
        { body: "The table that left before dessert,because the check took too long — gone." },
        { title: 'YOU DIDN\'T LOSE THEM TO A COMPETITOR.<br>YOU LOST THEM TO<br><span class="accent">A MOMENT NOBODY MANAGED.</span>' }
      ]
    }
  ];

  const root = document.getElementById('root');

  DATA.forEach(function (item) {

    const dayLabel = document.createElement('div');
    dayLabel.className = 'day-label';
    dayLabel.textContent = item.day;
    root.appendChild(dayLabel);

    const carousel = document.createElement('div');
    carousel.className = 'carousel';

    const win = document.createElement('div');
    win.className = 'carousel-window';

    const track = document.createElement('div');
    track.className = 'carousel-track';

    const slides = [];

    item.slides.forEach(function (sd, si) {
      const theme = THEMES[si % THEMES.length];
      const slide = document.createElement('div');
      slide.className = 'slide ' + theme;

      // accent bar
      const bar = document.createElement('div');
      bar.className = 'slide-accent-bar';
      slide.appendChild(bar);

      // profile
      const profile = document.createElement('div');
      profile.className = 'profile';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      const img = document.createElement('img');
      img.src = PHOTO_SRC;
      img.alt = 'Maurice Sanders';
      const ph = document.createElement('div');
      ph.className = 'avatar-placeholder';
      ph.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>';
      ph.style.display = 'none';
      img.onerror = function () { img.style.display = 'none'; ph.style.display = 'flex'; };
      avatar.appendChild(img); avatar.appendChild(ph);
      const info = document.createElement('div');
      const nameEl = document.createElement('div');
      nameEl.className = 'profile-name';
      nameEl.textContent = 'Maurice Sanders';
      const handleEl = document.createElement('div');
      handleEl.className = 'profile-handle';
      handleEl.textContent = '@maurice.seamlessly';
      info.appendChild(nameEl); info.appendChild(handleEl);
      profile.appendChild(avatar); profile.appendChild(info);
      slide.appendChild(profile);

      // content
      const content = document.createElement('div');
      content.className = 'content';

      if (sd.title) {
        const rule = document.createElement('div');
        rule.className = 'slide-rule';
        content.appendChild(rule);

        const title = document.createElement('div');
        title.className = 'slide-title';
        title.innerHTML = sd.title;
        content.appendChild(title);

        if (sd.sub) {
          const sub = document.createElement('div');
          sub.className = 'slide-sub';
          sub.textContent = sd.sub;
          content.appendChild(sub);
        }
      } else if (sd.body) {
        const body = document.createElement('div');
        body.className = 'slide-body';
        body.textContent = sd.body;
        content.appendChild(body);
      }

      slide.appendChild(content);

      // ghost
      const ghost = document.createElement('div');
      ghost.className = 'ghost';
      ghost.textContent = si + 1;
      slide.appendChild(ghost);

      // watermark — Hey (white) You (gold) Powered by Seamlessly
      const wm = document.createElement('div');
      wm.className = 'watermark';
      wm.innerHTML = '<span class="wm-hey">Hey</span><span class="wm-you">You</span><span class="wm-rest"> Powered by Seamlessly</span>';
      slide.appendChild(wm);

      track.appendChild(slide);
      slides.push(slide);
    });

    win.appendChild(track);
    carousel.appendChild(win);

    let current = 0;

    const nav = document.createElement('div');
    nav.className = 'nav';
    const prev = document.createElement('button');
    prev.className = 'nav-btn'; prev.textContent = '← Back';
    const next = document.createElement('button');
    next.className = 'nav-btn'; next.textContent = 'Next →';
    const dots = document.createElement('div');
    dots.className = 'dots';
    const dotEls = slides.map(function (_, i) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      dots.appendChild(d); return d;
    });

    function slideBg(s) {
      if (s.classList.contains('gold-slide')) return '#D4AF37';
      if (s.classList.contains('teal-slide')) return '#00D4AA';
      if (s.classList.contains('dark-slide')) return '#0D1520';
      return '#1A2A44';
    }
    function slug(t) { return t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
    function capture(s, n) {
      return html2canvas(s, { scale: 1, useCORS: true, allowTaint: true, logging: false, backgroundColor: slideBg(s) }).then(function (c) {
        const a = document.createElement('a');
        a.download = 'heyyou-' + slug(item.day) + '-slide-' + n + '.png';
        a.href = c.toDataURL('image/png');
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      });
    }

    const dlBtn = document.createElement('button');
    dlBtn.type = 'button'; dlBtn.className = 'download-btn download-current';
    const dlAllBtn = document.createElement('button');
    dlAllBtn.type = 'button'; dlAllBtn.className = 'download-btn download-all';
    dlAllBtn.textContent = 'Download All Slides';

    function updateLabel() { dlBtn.textContent = 'Download PNG — Slide ' + (current + 1) + ' of ' + slides.length; }
    function update() {
      track.style.transform = 'translateX(-' + (current * 1080) + 'px)';
      dotEls.forEach(function (d, i) { d.className = 'dot' + (i === current ? ' active' : ''); });
      prev.disabled = current === 0;
      next.disabled = current === slides.length - 1;
      updateLabel();
    }

    dlBtn.addEventListener('click', function () {
      dlBtn.disabled = true; dlBtn.textContent = 'Generating…';
      const orig = dlBtn.style.display; dlBtn.style.display = 'none';
      capture(slides[current], current + 1).then(function () {
        dlBtn.style.display = orig; dlBtn.disabled = false; updateLabel();
      }).catch(function (e) { dlBtn.style.display = orig; dlBtn.disabled = false; updateLabel(); console.error(e); });
    });

    dlAllBtn.addEventListener('click', function () {
      const saved = current;
      dlAllBtn.disabled = true; dlBtn.disabled = true;
      let chain = Promise.resolve();
      slides.forEach(function (s, i) {
        chain = chain.then(function () {
          current = i; update();
          dlAllBtn.textContent = 'Generating ' + (i + 1) + ' / ' + slides.length + '…';
          return capture(s, i + 1);
        });
      });
      chain.then(function () {
        current = saved; update(); dlAllBtn.disabled = false; dlBtn.disabled = false; dlAllBtn.textContent = 'Download All Slides';
      }).catch(function (e) {
        current = saved; update(); dlAllBtn.disabled = false; dlBtn.disabled = false; dlAllBtn.textContent = 'Download All Slides'; console.error(e);
      });
    });

    prev.onclick = function () { if (current > 0) { current--; update(); } };
    next.onclick = function () { if (current < slides.length - 1) { current++; update(); } };

    nav.appendChild(prev); nav.appendChild(dots); nav.appendChild(next);
    carousel.appendChild(nav);
    update();

    root.appendChild(carousel);
    root.appendChild(dlBtn);
    root.appendChild(dlAllBtn);
  });

})();
</script>
</body>
</html>
