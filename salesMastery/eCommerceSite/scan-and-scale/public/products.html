<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — Scan &amp; Scale</title>
  <meta name="description" content="Full product listing organized by collection with Stripe checkout tiers." />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/site.css" />
  <link rel="stylesheet" href="/styles/home.css" />
  <link rel="stylesheet" href="/styles/products-picker.css" />
</head>
<body class="has-carousel-layout page-products">
  <header class="site-header">
    <div class="site-header-inner">
      <a href="/" class="brand" data-sns-track="nav-brand">
        SCAN &amp; SCALE
        <span class="brand-sub">Seamlessly System Storefront</span>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a href="/" data-sns-track="nav-home">Home</a>
        <a href="/products" data-sns-track="nav-products">Products</a>
        <a href="/#get-started" data-sns-track="nav-get-started">Get Started</a>
      </nav>
    </div>
  </header>

  <section class="home-hero home-hero--banner" aria-hidden="true">
    <div class="home-hero__slides"></div>
    <div class="home-hero__overlay"></div>
  </section>

  <main class="shell page-products-main">
    <header class="products-picker-head">
      <h1>What Type of Venue Are You?</h1>
      <p class="products-picker-sub">
        Select your venue type to see the right system for your operation.
      </p>
    </header>

    <div id="products-root" class="products-venue-grid" aria-label="Venue types"></div>
  </main>

  <footer class="footer">
    © <span id="footer-year"></span> Seamlessly · scan-and-scale.seamlessly.us
  </footer>

  <script src="/js/site-analytics.js" defer></script>
  <script src="/js/products-data.js" defer></script>
  <script src="/js/products-page.js" defer></script>
  <script src="/js/products.js" defer></script>
  <script src="/js/home.js" defer></script>
  <script>
    document.getElementById('footer-year').textContent =
      new Date().getFullYear();
  </script>
</body>
</html>
