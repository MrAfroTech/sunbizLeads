<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How We Started — Seamlessly</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; padding: 0; margin: 0; }

  #card {
    background: #000;
    padding: 52px 72px 56px;
    width: 100%;
    border-bottom: 2px solid rgba(212,175,55,0.3);
  }

  .eyebrow {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(212,175,55,0.5);
    margin-bottom: 20px;
  }

  .how-we-started {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 2px;
    color: #ffffff;
    margin-bottom: 12px;
  }

  .ezdrink {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    letter-spacing: 3px;
    color: #D4AF37;
    line-height: 1;
    margin-bottom: 20px;
  }

  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 600;
    font-style: italic;
    color: #ffffff;
    margin-bottom: 36px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(212,175,55,0.25);
    margin-bottom: 28px;
  }

  .founder {
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 10px;
  }

  .contact {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #D4AF37;
  }

  button {
    display: block;
    width: 100%;
    padding: 12px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    color: #000;
    background: #D4AF37;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="card">
  <div class="eyebrow">Seamlessly · Origin Story</div>
  <div class="how-we-started">How We Started</div>
  <div class="ezdrink">EzDrink</div>
  <div class="tagline">Silent Ordering for Bars, Clubs, Festivals &amp; Events</div>
  <div class="divider"></div>
  <div class="founder">Maurice Sanders &nbsp;|&nbsp; Founder &amp; CTO</div>
  <div class="contact">maurice.sanders@seamlessly.us &nbsp;|&nbsp; 305-434-0738</div>
</div>

<button id="dlBtn">↓ Download as PNG</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  document.getElementById('dlBtn').addEventListener('click', function() {
    var btn = this;
    btn.disabled = true;
    btn.textContent = 'Generating…';
    document.fonts.ready.then(function() {
      html2canvas(document.getElementById('card'), {
        scale: 2, useCORS: true, backgroundColor: '#000000', logging: false
      }).then(function(canvas) {
        var a = document.createElement('a');
        a.download = 'seamlessly-how-we-started.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
        btn.disabled = false;
        btn.textContent = '↓ Download as PNG';
      });
    });
  });
</script>

</body>
</html>
