  <style>
    :root {
      --navy:       #1A2A44;
      --gold:       #D4AF37;
      --gold-light: #e8c84a;
      --white:      #FFFFFF;
      --stat:       #131414;
      --image-pct:  58%;
      --text-pct:   42%;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d1b2a;
      min-height: 100vh;
      color: var(--white);
      padding: 24px;
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900; font-size: 24px;
      color: var(--gold); text-align: center; margin-bottom: 4px;
    }

    .subtitle {
      text-align: center; color: rgba(255,255,255,0.4);
      font-size: 13px; margin-bottom: 40px;
    }

    .carousel-label {
      width: 100%; max-width: 1080px;
      margin: 48px auto 8px auto;
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); border-left: 3px solid var(--gold); padding-left: 10px;
    }

    .carousel-label:first-of-type { margin-top: 0; }

    .slide-label {
      width: 100%; max-width: 1080px;
      margin: 0 auto 8px auto;
      font-family: 'Inter', sans-serif; font-size: 11px;
      color: rgba(255,255,255,0.28); padding-left: 2px;
    }

    .section { margin-bottom: 8px; }

    .box-wrapper { display: inline-block; margin-bottom: 16px; }

    .carousel-card {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      background: var(--navy);
    }

    .card-left {
      width: var(--image-pct);
      flex-shrink: 0; height: 100%;
      position: relative; overflow: hidden;
    }

    .card-image { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-left-fade {
      position: absolute; inset: 0;
      background: linear-gradient(270deg, rgba(26,42,68,0.80) 0%, rgba(26,42,68,0.04) 45%, transparent 100%);
      pointer-events: none; z-index: 1;
    }

    .card-left-corner {
      position: absolute; top: 0; left: 0;
      width: 180px; height: 180px;
      background: linear-gradient(135deg, rgba(212,175,55,0.28) 0%, transparent 60%);
      pointer-events: none; z-index: 2;
    }

    .img-placeholder {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }

    .img-placeholder svg { width: 56px; height: 56px; stroke: rgba(212,175,55,0.35); }
    .img-placeholder p {
      font-family: 'Inter', sans-serif; font-size: 20px;
      color: rgba(212,175,55,0.35); text-align: center; padding: 0 32px; line-height: 1.5;
    }

    .card-right {
      width: var(--text-pct);
      flex-shrink: 0; height: 100%;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 64px 52px 60px 48px;
      background: var(--navy); position: relative;
    }

    .card-right::after {
      content: ''; position: absolute;
      right: 0; top: 0; bottom: 0; width: 6px;
      background: linear-gradient(180deg, var(--gold) 0%, rgba(212,175,55,0.08) 100%);
    }

    .card-top-row { display: flex; flex-direction: column; gap: 14px; }

    .card-topic-tag {
      font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600;
      color: var(--gold); letter-spacing: 2.5px; text-transform: uppercase; line-height: 1.3;
    }

    .card-rule { width: 48px; height: 4px; background: var(--gold); border-radius: 2px; }

    .card-logo {
      font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 20px;
      color: rgba(255,255,255,0.14); letter-spacing: 1px;
    }

    .card-body {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 40px 0; gap: 28px;
    }

    .card-headline {
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      color: var(--white); line-height: 1.13;
    }

    .stat-box {
      display: block;
      background: rgba(212,175,55,0.1);
      border: 2px solid rgba(212,175,55,0.32);
      border-radius: 12px; padding: 20px 26px;
      box-shadow: 0 4px 20px rgba(212,175,55,0.1);
    }

    .stat-number {
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      color: var(--stat); line-height: 1; display: block; font-size: 72px;
    }

    .stat-label {
      display: block; font-family: 'Inter', sans-serif; font-size: 18px;
      color: rgba(255,255,255,0.48); margin-top: 8px; line-height: 1.4;
    }

    .card-body-text {
      font-family: 'Inter', sans-serif; font-weight: 500;
      color: rgba(255,255,255,0.72); line-height: 1.65; font-size: 22px;
    }

    .card-bottom-row { display: flex; flex-direction: column; gap: 12px; }

    .card-slide-indicator {
      font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 600;
      color: rgba(212,175,55,0.4); letter-spacing: 1px;
    }

    .card-cta {
      font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600;
      color: rgba(212,175,55,0.48);
    }

    .download-btn {
      display: block;
      width: 1080px;
      margin: 0 auto 32px auto;
      padding: 14px 24px;
      font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700;

      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(212,175,55,0.3);
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212,175,55,0.4);
    }
  </style>
</head>

            link.click();
          }).catch(function (err) {
            btn.style.display = btnOriginalDisplay;
            btn.disabled = false;
            btn.textContent = defaultBtnText;
            console.error('PNG generation failed:', err);
          });
        });

        section.appendChild(boxWrapper);
        section.appendChild(btn);
        root.appendChild(section);
      });
    });

  }());
  </script>
</body>
