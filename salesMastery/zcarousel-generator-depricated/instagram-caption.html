<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captions — @maurice.seamlessly</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0f0f0f; color: #fff; padding: 48px 24px; min-height: 100vh; }
    h1 { font-size: 11px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.25); text-align: center; margin-bottom: 64px; }
    .week-label { font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.18); margin: 0 auto 20px auto; max-width: 720px; }
    .post { max-width: 720px; margin: 0 auto 40px auto; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; overflow: hidden; }
    .post-header { padding: 16px 24px 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .post-day { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-bottom: 10px; }
    .image-line-1 { font-size: 17px; font-weight: 700; line-height: 1.3; color: #fff; margin-bottom: 6px; }
    .image-line-2 { font-size: 15px; font-weight: 400; line-height: 1.35; color: rgba(255,255,255,0.45); }
    .caption-block { padding: 20px 24px; }
    .caption-label { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.18); margin-bottom: 10px; }
    .caption-text { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.62); margin-bottom: 12px; white-space: pre-line; }
    .hashtags { font-size: 13px; color: rgba(255,255,255,0.28); font-family: 'DM Mono', monospace; margin-bottom: 16px; line-height: 1.8; }
    .copy-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #000; background: #fff; border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.15s, background 0.15s, color 0.15s; }
    .copy-btn:hover { opacity: 0.85; }
    .copy-btn.copied { background: #22c55e; color: #fff; }
  </style>
</head>
<body>
  <h1>@maurice.seamlessly — Captions</h1>
  <div id="root"></div>

  <script>
  (function () {

    var DATA = [
      {
        week: 'Week 1: The Problem',
        day: 'Week 1 — Day 1 (Post 1)',
        line1: '[Blank post]',
        line2: '',
        caption: 'Some things don\'t need a caption.\n\nDrop a 🤐 if you know exactly what this means for your operation.',
        hashtags: '#HospitalityLeadership #GuestExperience #HospitalityOperations #VenueManagement #SeamlessHospitality'
      },
      {
        day: 'Week 1 — Day 1 (Post 2)',
        line1: 'Your Fans Want To Order. The Line Is Stopping Them.',
        line2: '45% abandon long lines. 77% would spend more if lines were shorter. 80% abandon a purchase mid-line at least once.',
        caption: `Printing a menu online and calling it innovation is like buying a smartphone just to use the flashlight.

The real value starts after the scan:
upsells,
loyalty,
customer data,
faster transactions,
and repeat purchases.

That’s where modern QR implementation actually wins.`,
        hashtags: '#StadiumOps #EventVenues #GuestExperience #HospitalityOperations #SeamlessHospitality'
      },
      {
        day: 'Week 1 — Day 2',
        line1: 'You think you\'re creating a custom experience. Your guests think you\'re guessing.',
        line2: 'The gap between what you think you\'re delivering and what they actually feel — that\'s where loyalty dies.',
        caption: `Using a QR code only for a menu is like owning a drive-thru but only serving one car at a time.

Every scan should create an opportunity.

It should increase speed.
Increase order volume.
Increase repeat business.

Every scan should have a purpose.`,
        hashtags: '#GuestExperience #Personalization #HospitalityLeadership #HospitalityOperations #SeamlessHospitality'
      },
      {
        day: 'Week 1 — Day 3',
        line1: 'Demand isn\'t the problem. Indifference is.',
        line2: 'People are still going out. They\'re just quicker to decide who\'s worth going to. (Deloitte)',
        caption: `Ignoring QR behavior today is like a business ignoring credit cards in the early 2000s.

Customers already know how to scan.

That part is over.

Now businesses need systems behind the scan.`,
        hashtags: '#HospitalityIndustry #GuestExperience #HospitalityLeadership #EventManagement #SeamlessHospitality'
      },
      {
        day: 'Week 1 — Day 4',
        line1: 'Basic doesn\'t fade. It disappears.',
        line2: 'The operators who can\'t make their experience feel distinct aren\'t losing to competitors — they\'re losing to forgettability.',
        caption: `Long lines are like leaks in a bucket.

You don’t notice how much you’re losing until it’s empty.

Faster ordering increases throughput.
Throughput increases revenue.`,
        hashtags: '#HospitalityBusiness #BrandStrategy #GuestExperience #VenueManagement #SeamlessHospitality'
      },
      {
        day: 'Week 1 — Day 5',
        line1: '90% of hospitality brands have a loyalty program.',
        line2: 'Most guests can\'t tell you what makes any of them worth staying loyal to. (HBR)',
        caption: `Getting thousands of scans without collecting data is like owning a packed nightclub and never charging cover.

Traffic alone means nothing.

The value is in what happens after the scan.

Every scan should have a purpose.`,
        hashtags: '#CustomerLoyalty #HospitalityLeadership #GuestExperience #RetentionStrategy #SeamlessHospitality'
      },
      {
        day: 'Week 1 — Day 6',
        line1: 'Highly engaged teams are 23% more profitable.',
        line2: 'Which means disengaged ones are bleeding money quietly, every single shift.',
        caption: `Hospitality today is like air travel.

People remember the experience more than the vehicle.

Speed.
Convenience.
Personalization.

That’s what modern guests remember.`,
        hashtags: '#HospitalityLeadership #StaffEngagement #TeamCulture #HospitalityOperations #SeamlessHospitality'
      },
      {
        day: 'Week 1 — Day 7',
        line1: 'Friction isn\'t a complaint. It\'s a decision.',
        line2: 'Every time a guest hits resistance — ordering, waiting, asking — they\'re deciding whether to come back. (Medallia)',
        caption: `Businesses avoiding digital ordering today are like stores that refused to accept debit cards.

Consumer behavior already changed.

The fastest operators remove friction fastest.`,
        hashtags: '#GuestExperience #HospitalityOperations #HospitalityLeadership #ServiceExcellence #SeamlessHospitality'
      }
    ];

    var root = document.getElementById('root');
    var lastWeek = '';

    DATA.forEach(function (post) {

      if (post.week && post.week !== lastWeek) {
        var wl = document.createElement('div');
        wl.className = 'week-label';
        wl.style.marginTop = lastWeek ? '64px' : '0';
        wl.textContent = post.week;
        root.appendChild(wl);
        lastWeek = post.week;
      }

      var el = document.createElement('div');
      el.className = 'post';

      var header = document.createElement('div');
      header.className = 'post-header';

      var dayEl = document.createElement('div');
      dayEl.className = 'post-day';
      dayEl.textContent = post.day;
      header.appendChild(dayEl);

      var l1 = document.createElement('div');
      l1.className = 'image-line-1';
      l1.textContent = post.line1;
      header.appendChild(l1);

      if (post.line2) {
        var l2 = document.createElement('div');
        l2.className = 'image-line-2';
        l2.textContent = post.line2;
        header.appendChild(l2);
      }

      el.appendChild(header);

      var cap = document.createElement('div');
      cap.className = 'caption-block';

      var label = document.createElement('div');
      label.className = 'caption-label';
      label.textContent = 'Caption + Hashtags';
      cap.appendChild(label);

      var capText = document.createElement('div');
      capText.className = 'caption-text';
      capText.textContent = post.caption;
      cap.appendChild(capText);

      var hash = document.createElement('div');
      hash.className = 'hashtags';
      hash.textContent = post.hashtags;
      cap.appendChild(hash);

      var full = post.caption + '\n\n' + post.hashtags;
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy Caption';

      btn.addEventListener('click', function () {
        navigator.clipboard.writeText(full).then(function () {
          btn.textContent = '✓ Copied';
          btn.classList.add('copied');
          setTimeout(function () { btn.textContent = 'Copy Caption'; btn.classList.remove('copied'); }, 2000);
        });
      });

      cap.appendChild(btn);
      el.appendChild(cap);
      root.appendChild(el);
    });

  }());
  </script>
</body>
</html>
