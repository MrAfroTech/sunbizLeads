<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Coffee Conversations Collective</title>
    <style>
        :root {
            --primary-brown: #4A2C17;
            --primary-gold: #D4AF37;
            --accent-coffee: #6F4E37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, rgba(74, 44, 23, 0.95) 0%, rgba(111, 78, 55, 0.9) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-container {
            max-width: 600px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 30px;
        }

        .success-title {
            font-size: 36px;
            color: var(--primary-brown);
            margin-bottom: 20px;
            font-weight: 700;
        }

        .success-message {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .back-button {
            display: inline-block;
            padding: 14px 30px;
            background: var(--primary-brown);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .back-button:hover {
            background: var(--accent-coffee);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✅</div>
        <h1 class="success-title">Payment Successful!</h1>
        <p class="success-message">
            Your tickets have been purchased successfully. Check your email for your ticket confirmation with QR codes.
        </p>
        <a href="/allevents" class="back-button">Return to Events</a>
    </div>
</body>
</html>
