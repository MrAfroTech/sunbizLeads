<!DOCTYPE html>
<!--
  VERIFY — Gold from ContentPage.css .content-page (line 4).
  Page (body): linear-gradient(-45deg, #d4af37, #e0b841, #f5d76e, #e0b841).
  Box: solid #e0b841 (same gold) so html2canvas renders it; gradient was rendering dark in PNG.
  Card text: #1a1410. html2canvas backgroundColor + onclone set to #e0b841.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Generator | Script Boxes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Italiana&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Exact: ContentPage.css .content-page — gold background (no dark overlay) */
    body {
      font-family: 'Italiana', serif;
      background: linear-gradient(-45deg, #d4af37, #e0b841, #f5d76e, #e0b841);
      min-height: 100vh;
      color: #1a1410;
      line-height: 1.6;
      padding: 24px;
    }

    /* Gold from ContentPage.css — solid so html2canvas can render it (gradients often render dark) */
    .carousel-box {
      width: 1080px;
      height: 1080px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
      background: #e0b841;
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
    }

    .carousel-box-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding-top: 0;
    }

    /* Text block: fills remaining space, centered; font-size set by JS */
    .carousel-box-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 0;
      width: 100%;
      padding: 0 16px;
    }

    /* Card text: #1a1410; font-weight 700 kept */
    .carousel-box-text p {
      font-weight: 700;
      color: #1a1410;
      line-height: 1.3;
      margin: 0 0 0.4em 0;
    }

    .carousel-box-text p:last-child {
      margin-bottom: 0;
    }

    /* Exact from ContentPage.css .icon-container; icon at top-center with consistent padding */
    .carousel-box-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(224, 184, 65, 0.1), rgba(224, 184, 65, 0.2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5D4A1F;
      flex-shrink: 0;
      margin-bottom: 24px;
    }

    .carousel-box-icon svg {
      width: 30px;
      height: 30px;
    }

    .script-divider {
      width: 100%;
      max-width: 1080px;
      margin: 48px 0 24px 0;
      padding: 16px 24px;
      background: rgba(26, 20, 16, 0.9);
      color: #e0b841;
      font-size: 22px;
      font-weight: 700;
      border-radius: 8px;
      border-left: 4px solid #e0b841;
      text-align: left;
    }

    .script-divider:first-of-type {
      margin-top: 0;
    }

    .box-wrapper {
      display: inline-block;
      margin-bottom: 16px;
    }

    .download-btn {
      display: block;
      width: 1080px;
      margin: 0 auto 32px auto;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 700;
      color: #1a1410;
      background: linear-gradient(135deg, #e0b841, #d4af37);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(224, 184, 65, 0.3);
    }

    .download-btn:hover {
      background: linear-gradient(135deg, #e5c860, #e0b841);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(224, 184, 65, 0.4);
    }

    .section {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    (function() {
      var scripts = [
        {
          title: 'Carousel 1 — The $25 Million Problem',
          boxes: [
            "Waiting in line is the hospitality industry's silent killer.",
            "Guests abandon lines longer than 8 minutes, costing the industry $25 million annually in lost revenue.",
            "80% of guests say long waits ruin their experience — and once they walk away, they rarely come back.",
            "Seamlessly cuts wait times under 6 minutes, capturing the revenue others lose.",
            "No lines. No losses. Just seamless experiences. / ➜ See how in Part 2."
          ]
        },
        {
          title: 'Carousel 2 — The Staff Burnout Loop',
          boxes: [
            "When guests wait, employees quit.",
            "The average frontline hospitality worker lasts only 59 days, costing companies $2 billion/year in recruitment and training.",
            "Each new hire drains up to $5,600 in onboarding costs and slows service for weeks.",
            "With smoother operations and fewer complaints, staff stay longer — cutting turnover up to 40%.",
            "Happier teams. Healthier margins. / ➜ See what's really breaking systems in Part 3."
          ]
        },
        {
          title: 'Carousel 3 — The Tech Tangle',
          boxes: [
            "You don't need five systems to sell one meal.",
            "Disconnected tools — ticketing, POS, delivery, reservations — bleed $8,000/month in redundant fees and wasted time.",
            "Fragmented data = lost insights = lower revenue per order by 15% on average.",
            "Seamlessly integrates your entire stack into one cohesive platform — one login, one dashboard, one source of truth.",
            "Simpler systems, smarter operations. / ➜ See the unified solution in Part 4."
          ]
        },
        {
          title: 'Carousel 4 — The Seamlessly Advantage',
          boxes: [
            "One platform. Unlimited performance.",
            "The average venue runs 6.2 tech tools that don't talk to each other — limiting throughput and customer experience.",
            "70% of operators say tech fragmentation keeps them from scaling.",
            "Seamlessly + Eventbrella unify ticketing, POS, delivery, and scheduling — cutting tech costs by 40% and boosting revenue up to 30%.",
            "One flow. One interface. Every guest, connected. / ➜ See the future in Part 5."
          ]
        },
        {
          title: 'Carousel 5 — The Future of Connected Hospitality',
          boxes: [
            "Imagine if every guest touchpoint worked like clockwork.",
            "Friction between venues, vendors, and views costs the industry billions yearly in lost loyalty and misused data.",
            "The next decade's most profitable venues will win on experience consistency and data flow.",
            "Seamlessly creates a connected ecosystem that improves guest satisfaction by 35% and retention by 50%.",
            "From data to delight — Seamlessly is redefining hospitality. / ➜ Follow for insights and see how to join the movement."
          ]
        }
      ];

      function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      /* Lucide icons: clock, star, trending-down, zap, bar-chart (24x24, stroke 2, match IncreaseRevenue icon style) */
      var iconSvgs = [
        '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 6"/><polyline points="16 17 22 17 22 11"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>'
      ];

      var root = document.getElementById('root');

      scripts.forEach(function(script, scriptIdx) {
        var divider = document.createElement('div');
        divider.className = 'script-divider';
        divider.textContent = script.title;
        root.appendChild(divider);

        script.boxes.forEach(function(boxText, boxIdx) {
          var section = document.createElement('div');
          section.className = 'section';

          var boxWrapper = document.createElement('div');
          boxWrapper.className = 'box-wrapper';

          var box = document.createElement('div');
          box.className = 'carousel-box';
          box.setAttribute('data-capture', 'true');

          var inner = document.createElement('div');
          inner.className = 'carousel-box-inner';
          var iconWrap = document.createElement('div');
          iconWrap.className = 'carousel-box-icon';
          iconWrap.innerHTML = iconSvgs[scriptIdx];
          inner.appendChild(iconWrap);
          var lines = boxText.split(' / ').map(function(s) { return s.trim(); });
          var textWrap = document.createElement('div');
          textWrap.className = 'carousel-box-text';
          lines.forEach(function(line) {
            var p = document.createElement('p');
            p.textContent = line;
            textWrap.appendChild(p);
          });
          /* Dynamic font size: fit all lines in box without clipping (box 1080px, padding 80, icon ~84px) */
          var textAreaHeight = 1080 - 160 - 84;
          var lineCount = lines.length;
          var fontSize = Math.min(72, Math.max(28, Math.floor(textAreaHeight / (lineCount * 1.3))));
          textWrap.style.fontSize = fontSize + 'px';
          inner.appendChild(textWrap);

          box.appendChild(inner);
          boxWrapper.appendChild(box);

          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'download-btn';
          var defaultBtnText = 'Download PNG';
          btn.textContent = defaultBtnText;
          btn.addEventListener('click', function() {
            btn.disabled = true;
            btn.textContent = 'Generating PNG...';

            var btnOriginalDisplay = btn.style.display;
            btn.style.display = 'none';

            html2canvas(box, {
              scale: 1,
              useCORS: true,
              logging: false,
              backgroundColor: '#e0b841',
              onclone: function(clonedDoc, clonedNode) {
                var style = clonedNode.style;
                if (style) {
                  style.background = '#e0b841';
                  style.backgroundColor = '#e0b841';
                }
              }
            }).then(function(canvas) {
              btn.style.display = btnOriginalDisplay;
              btn.disabled = false;
              btn.textContent = defaultBtnText;

              var imgData = canvas.toDataURL('image/png');
              var link = document.createElement('a');
              link.download = 'script-' + (scriptIdx + 1) + '-box-' + (boxIdx + 1) + '.png';
              link.href = imgData;
              link.click();
            }).catch(function(err) {
              btn.style.display = btnOriginalDisplay;
              btn.disabled = false;
              btn.textContent = defaultBtnText;
              console.error('PNG generation failed:', err);
            });
          });

          section.appendChild(boxWrapper);
          section.appendChild(btn);
          root.appendChild(section);
        });
      });
    })();
  </script>
</body>
</html>
